  // ─── CSS Minifier ─────────────────────────────────────────────────────────────
  function minifyCSS(css, mergeDups) {
    // 1. Preserve important comments (/*! ... */)
    const importantComments = [];
    css = css.replace(/\/\*![\s\S]*?\*\//g, (match) => {
      const placeholder = `__IMPORTANT_COMMENT_${importantComments.length}__`;
      importantComments.push(match);
      return placeholder;
    });

    // 2. Remove regular comments (/* ... */)
    css = css.replace(/\/\*[\s\S]*?\*\//g, '');

    // 3. Restore important comments
    importantComments.forEach((comment, i) => {
      css = css.replace(`__IMPORTANT_COMMENT_${i}__`, comment);
    });

    // 4. Collapse whitespace (tabs, newlines → space)
    css = css.replace(/\s+/g, ' ');

    // 5. Remove spaces around structural characters
    css = css.replace(/\s*{\s*/g, '{');
    css = css.replace(/\s*}\s*/g, '}');
    css = css.replace(/\s*;\s*/g, ';');
    css = css.replace(/\s*:\s*/g, ':');
    css = css.replace(/\s*,\s*/g, ',');
    css = css.replace(/\s*>\s*/g, '>');
    css = css.replace(/\s*\+\s*/g, '+');
    css = css.replace(/\s*~\s*/g, '~');

    // 6. Remove trailing semicolons before }
    css = css.replace(/;}/g, '}');

    // 7. Shorten hex colors: #aabbcc → #abc
    css = css.replace(/#([0-9a-fA-F])\1([0-9a-fA-F])\2([0-9a-fA-F])\3\b/g, '#$1$2$3');

    // 8. Convert rgb(0,0,0) → #000  and  rgb(255,255,255) → #fff
    css = css.replace(/rgb\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/g, (match, r, g, b) => {
      const ri = parseInt(r), gi = parseInt(g), bi = parseInt(b);
      if (ri >= 0 && ri <= 255 && gi >= 0 && gi <= 255 && bi >= 0 && bi <= 255) {
        const hex = '#' +
          ri.toString(16).padStart(2, '0') +
          gi.toString(16).padStart(2, '0') +
          bi.toString(16).padStart(2, '0');
        // Try to shorten
        const shortened = hex.replace(/^#([0-9a-f])\1([0-9a-f])\2([0-9a-f])\3$/, '#$1$2$3');
        return shortened;
      }
      return match;
    });

    // 9. Shorten 0px, 0em, 0rem, 0% → 0
    css = css.replace(/\b0(px|em|rem|%|vw|vh|vmin|vmax|cm|mm|in|pt|pc|ex|ch)\b/g, '0');

    // 10. Shorten 0.X → .X
    css = css.replace(/\b0\.([\d])/g, '.$1');

    // 11. Merge duplicate selectors (optional)
    if (mergeDups) {
      css = mergeDuplicateSelectors(css);
    }

    // 12. Trim whitespace
    css = css.trim();

    return css;
  }

  // Merge duplicate selectors
  function mergeDuplicateSelectors(css) {
    // Simple block parser: find selector{properties} pairs
    const blocks = {};
    const order = [];

    // We'll use a naive approach to extract top-level rules only
    const blockRegex = /([^{}]+)\{([^{}]*)\}/g;
    let match;
    let result = css;

    // Re-parse from scratch
    const allBlocks = [];
    let remaining = css;

    while (remaining.length > 0) {
      // Find next {
      const openIdx = remaining.indexOf('{');
      if (openIdx === -1) break;

      const selector = remaining.slice(0, openIdx).trim();
      remaining = remaining.slice(openIdx + 1);

      // Find matching }
      let depth = 1;
      let i = 0;
      while (i < remaining.length && depth > 0) {
        if (remaining[i] === '{') depth++;
        else if (remaining[i] === '}') depth--;
        i++;
      }

      const body = remaining.slice(0, i - 1);
      remaining = remaining.slice(i).trim();

      if (selector) {
        allBlocks.push({ selector, body });
      }
    }

    // Merge duplicate selectors
    const merged = {};
    const mergedOrder = [];
    for (const block of allBlocks) {
      if (merged[block.selector] !== undefined) {
        // Merge: combine properties (deduplicate by last-wins)
        const existingProps = parseProps(merged[block.selector]);
        const newProps = parseProps(block.body);
        // Merge newProps into existingProps (new overwrites old for same key)
        for (const [k, v] of Object.entries(newProps)) {
          existingProps[k] = v;
        }
        merged[block.selector] = propsToString(existingProps);
      } else {
        merged[block.selector] = block.body;
        mergedOrder.push(block.selector);
      }
    }

    return mergedOrder.map(sel => `${sel}{${merged[sel]}}`).join('');
  }

  function parseProps(body) {
    const props = {};
    const parts = body.split(';').filter(p => p.trim());
    for (const part of parts) {
      const colonIdx = part.indexOf(':');
      if (colonIdx > -1) {
        const key = part.slice(0, colonIdx).trim();
        const val = part.slice(colonIdx + 1).trim();
        if (key) props[key] = val;
      }
    }
    return props;
  }

  function propsToString(props) {
    return Object.entries(props).map(([k, v]) => `${k}:${v}`).join(';');
  }

  // ─── CSS Beautifier ───────────────────────────────────────────────────────────
  function beautifyCSS(css, indentStr) {
    // First minify lightly (remove excess whitespace, preserve comments)
    // Remove excess whitespace while keeping comments
    const parts = [];
    let i = 0;
    while (i < css.length) {
      if (css[i] === '/' && css[i+1] === '*') {
        const end = css.indexOf('*/', i);
        if (end === -1) {
          parts.push(css.slice(i));
          break;
        }
        parts.push(css.slice(i, end + 2));
        i = end + 2;
      } else {
        parts.push(css[i]);
        i++;
      }
    }

    // Join and normalize whitespace
    let flat = parts.join('').replace(/\s+/g, ' ').trim();

    // Now format
    let result = '';
    let indent = 0;
    let inComment = false;
    let inString = false;
    let i2 = 0;

    const getIndent = () => indentStr.repeat(indent);

    while (i2 < flat.length) {
      const ch = flat[i2];

      // Handle comment pass-through
      if (!inComment && ch === '/' && flat[i2+1] === '*') {
        const end = flat.indexOf('*/', i2);
        const comment = end === -1 ? flat.slice(i2) : flat.slice(i2, end + 2);
        // Add newline before comment if not at start
        if (result.length > 0 && !result.endsWith('\n')) result += '\n';
        result += getIndent() + comment.trim() + '\n';
        i2 = end === -1 ? flat.length : end + 2;
        continue;
      }

      if (ch === '{') {
        // Trim the selector before {
        result = result.trimEnd() + ' {\n';
        indent++;
        i2++;
        // Skip any whitespace after {
        while (i2 < flat.length && flat[i2] === ' ') i2++;
        continue;
      }

      if (ch === '}') {
        indent = Math.max(0, indent - 1);
        // End last property line if needed
        if (!result.endsWith('\n')) result += '\n';
        result += getIndent() + '}\n\n';
        i2++;
        while (i2 < flat.length && flat[i2] === ' ') i2++;
        continue;
      }

      if (ch === ';') {
        result += ';\n';
        i2++;
        while (i2 < flat.length && flat[i2] === ' ') i2++;
        // Add indent for next property
        if (i2 < flat.length && flat[i2] !== '}') {
          result += getIndent();
        }
        continue;
      }

      // Normal character — add indent at start of line if needed
      if (result.endsWith('\n') && ch !== ' ') {
        result += getIndent() + ch;
        i2++;
        continue;
      }

      result += ch;
      i2++;
    }

    // Clean up: collapse multiple blank lines into one
    result = result.replace(/\n{3,}/g, '\n\n').trim();

    return result;
  }

  // ─── Statistics ───────────────────────────────────────────────────────────────
  function computeStats(input, output) {
    const origBytes = new TextEncoder().encode(input).length;
    const outBytes = new TextEncoder().encode(output).length;
    const savings = origBytes - outBytes;
    const savingsPct = origBytes > 0 ? ((savings / origBytes) * 100).toFixed(1) : 0;

    // Count rules: number of { } blocks at top level (approximate)
    const ruleCount = (output.match(/\{/g) || []).length;

    // Count properties: count ; occurrences + handle last property without ;
    // Approximate by counting : inside { }
    const propCount = (output.match(/[a-z-]+\s*:/gi) || []).length;

    return { origBytes, outBytes, savings, savingsPct, ruleCount, propCount };
  }

  function formatBytes(n) {
    if (n < 1024) return n + ' B';
    return (n / 1024).toFixed(1) + ' KB';
  }

  function updateStats(input, output) {
    if (!input.trim()) {
      ['statOriginal', 'statOutput', 'statSavings', 'statRules', 'statProps'].forEach(id => {
        document.getElementById(id).textContent = '—';
      });
      return;
    }

    const s = computeStats(input, output);
    document.getElementById('statOriginal').textContent = formatBytes(s.origBytes);
    document.getElementById('statOutput').textContent = formatBytes(s.outBytes);
    const savEl = document.getElementById('statSavings');

    if (currentMode === 'minify') {
      savEl.textContent = s.savings > 0
        ? `-${formatBytes(s.savings)} (${s.savingsPct}%)`
        : '0 B (0%)';
      savEl.className = 'stat-value ' + (s.savings > 0 ? 'green' : '');
    } else {
      const expansion = s.outBytes - s.origBytes;
      savEl.textContent = expansion > 0
        ? `+${formatBytes(expansion)}`
        : formatBytes(0);
      savEl.className = 'stat-value yellow';
    }

    document.getElementById('statRules').textContent = s.ruleCount;
    document.getElementById('statProps').textContent = s.propCount;
  }

  // ─── Mode ─────────────────────────────────────────────────────────────────────
  function setMode(mode) {
    currentMode = mode;
    document.getElementById('btnMinify').classList.toggle('active', mode === 'minify');
    document.getElementById('btnBeautify').classList.toggle('active', mode === 'beautify');
    document.getElementById('indentSelect').classList.toggle('visible', mode === 'beautify');
    document.getElementById('mergeLabel').style.display = mode === 'minify' ? '' : 'none';
    document.getElementById('outputLabel').textContent =
      mode === 'minify' ? 'MINIFIED OUTPUT' : 'BEAUTIFIED OUTPUT';
    processNow();
  }

  // ─── Processing ───────────────────────────────────────────────────────────────
  function scheduleProcess() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(processNow, 250);
  }

  function processNow() {
    const input = document.getElementById('inputArea').value;
    const errorBanner = document.getElementById('errorBanner');

    if (!input.trim()) {
      document.getElementById('outputArea').value = '';
      updateStats('', '');
      errorBanner.classList.remove('visible');
      return;
    }

    try {
      let output;
      if (currentMode === 'minify') {
        const mergeDups = document.getElementById('mergeDuplicates').checked;
        output = minifyCSS(input, mergeDups);
      } else {
        const indentVal = document.getElementById('indentSelect').value;
        const indentStr = indentVal === 'tab' ? '\t' : ' '.repeat(parseInt(indentVal));
        output = beautifyCSS(input, indentStr);
      }

      document.getElementById('outputArea').value = output;
      updateStats(input, output);
      errorBanner.classList.remove('visible');
    } catch (err) {
      errorBanner.textContent = 'Error: ' + err.message;
      errorBanner.classList.add('visible');
    }
  }

  // ─── Actions ──────────────────────────────────────────────────────────────────
  function clearInput() {
    document.getElementById('inputArea').value = '';
    document.getElementById('outputArea').value = '';
    updateStats('', '');
    document.getElementById('errorBanner').classList.remove('visible');
  }

  function copyOutput() {
    const output = document.getElementById('outputArea').value;
    if (!output) return;

    navigator.clipboard.writeText(output).then(() => {
      const btn = document.getElementById('copyBtn');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.classList.add('success');
      setTimeout(() => {
        btn.textContent = orig;
        btn.classList.remove('success');
      }, 1500);
    }).catch(() => {
      // Fallback
      document.getElementById('outputArea').select();
      document.execCommand('copy');
    });
  }

  function downloadOutput() {
    const output = document.getElementById('outputArea').value;
    if (!output) return;
    const suffix = currentMode === 'minify' ? '.min.css' : '.beautified.css';
    const blob = new Blob([output], { type: 'text/css' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'styles' + suffix;
    a.click();
    URL.revokeObjectURL(url);
  }

  function loadSample(name) {
    document.getElementById('inputArea').value = SAMPLES[name] || '';
    processNow();
  }

  // ─── Init ─────────────────────────────────────────────────────────────────────
  // Ensure merge label is visible on init (minify mode)
  document.getElementById('mergeLabel').style.display = '';
</script>
